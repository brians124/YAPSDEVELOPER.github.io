<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uganda Top Hits 2026</title>
    <link rel="stylesheet" href="Upload.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="upload-container">
        <h2>Upload New 2026 Track</h2>
        <form action="upload.php" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <input type="text" name="artist" placeholder="Artist Name" required>
                <input type="text" name="title" placeholder="Song Title" required>
            </div>
            <div class="file-input-wrapper">
                <input type="file" name="songFile" accept=".mp3" required>
                <input type="file" name="image" required>
            </div>
            <button type="submit" class="upload-btn">Upload to Server</button>
        </form>
    </section>

</body>
</html>
